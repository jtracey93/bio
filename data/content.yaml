Profile: |
  Senior Cloud Solution Architect at Microsoft with over 15 years in IT, operating at the intersection of platform engineering and product management. Founded, built, and scaled four Azure-wide platform products from concept to enterprise-scale adoption: [Azure landing zone (ALZ)](https://aka.ms/alz), [Sovereign landing zone (SLZ)](https://aka.ms/sovereign/slz), [Azure Verified Modules (AVM)](https://aka.ms/avm), and [Subscription Vending](https://aka.ms/sub-vending). Defined the product vision, wrote and reviewed code, shaped roadmaps, prioritised backlogs, and drove cross-functional delivery for each; resulting in platforms used by thousands of organisations globally in production.

  <br>

  Deep expertise in Azure Resource Manager (ARM), the Azure control plane, Infrastructure-as-Code (Bicep, Terraform), Azure Policy, governance, and deployment reliability. Proven track record of translating real-world customer pain and field telemetry into platform strategy, product requirements, and engineering priorities. Ships production-grade platform products spanning reference architectures, governance frameworks, policy definitions, IaC modules, and deployment tooling through open-source repositories and public registries, coordinating cross-functional and cross-organisation delivery across engineering, product management, and field teams at Azure-wide scale.

  <br>

  Microsoft Ignite and Build speaker. Former Microsoft MVP (Azure) and Microsoft Certified Trainer (MCT). Co-founder of the Sussex Azure User Group, part of the [Silicon Brighton](https://siliconbrighton.com/) network. Regular presenter at Bicep, Azure landing zone, and Azure Verified Modules public community calls, and guest on [Ctrl + Alt + Azure](https://ctrlaltazure.com/people/jack-tracey). Recognised technical authority and thought leader in the Azure platform engineering, landing zones, IaC, governance, and sovereign cloud across the Azure community, with a blog, previously, ranked in the top 50 Azure blogs globally.

  <br>

  Before joining Microsoft, Jack was a Solutions Architect at CDW UK, leading pre- and post-sales Azure, AWS, and GCP architecture for enterprise customers. He started his IT career at 17, progressing through IT Genie Limited, JSPC Computer Services, and Acora — where he rose from Technical Systems Engineer to Technical Engineering Lead and Technical Architect, focussing on Microsoft Cloud (M365 and Azure). Deep background in networking, on-premises data centre builds, and the Microsoft technology ecosystem throughout.


Highlights:
  - Icon: fas fa-landmark
    Title: Azure landing zone (ALZ) - Technical Lead & Product Owner
    Description: Matured ALZ to product it is today from initial internal project "North Star/ESLZ". Defining product vision, engineering the reference architecture, and driving adoption across thousands of enterprise customers globally grounded on real-world customer pain and field telemetry. ALZ is the most widely adopted Azure landing zone, with tens of thousands of customers using it as the platform landing zone foundation of their Azure environments globally.
  - Icon: fas fa-shield-alt
    Title: Sovereign landing zone (SLZ) - Technical Lead & Product Owner
    Description: Owner of the Sovereign landing zone (SLZ). The only available offering in the Microsoft Sovereign public cloud space (as of March 2026). Defined the architecture, tooling, guidance, roadmap, and go-to-market strategy built as a variant on top of ALZ for regulated and sovereign workloads
  - Icon: fas fa-cubes
    Title: Azure Verified Modules (AVM) - Technical Lead & Product Owner
    Description: Built and scaled Azure Verified Modules (AVM) product. Standardised, reusable, Microsoft official Bicep and Terraform modules shipped through public registries and adopted across Azure consumers globally. Over 30+ million deployments to date and growing month on month. Defined the product vision, module design, engineering standards, and delivery processes for AVM across multiple engineering teams and product areas within Azure.
  - Icon: fas fa-ticket-alt
    Title: Subscription Vending - Technical Lead & Product Owner
    Description: Designed and built Subscription Vending — enabling enterprises to automate Azure subscription lifecycle management at scale through Infrastrcuture-as-Code (IaC) and the ARM control plane. Drove the product from concept to delivery, defining the architecture, engineering the solution, and driving adoption across the field. Subscription Vending is now a critical part of customer platform landing zone journey in the path to democratizing Azure subscription across their organisations.
  - Icon: fas fa-microphone-alt
    Title: Community & Public Speaking
    Description: Microsoft Ignite & Build conference speaker, Ctrl+Alt+Azure podcast guest, and regular presenter at Bicep, Azure landing zone, and Sovereign Cloud community calls. Regular social media (LinkedIn) and YouTube videos posted about products such as ALZ and AVM. Blog previously ranked in top 50 Azure blogs globally.
  - Icon: fas fa-award
    Title: Industry Recognised & Trusted Voice
    Description: Former Microsoft MVP in the Azure category for 2 years before joining Microsoft and handing back MVP status. Trusted technical authority across the Azure community on platform engineering, landing zones, IaC, governance, and sovereign cloud through community outreach efforts and product evangelism.

